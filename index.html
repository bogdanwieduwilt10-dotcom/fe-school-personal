<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

<body>
    <main class="main1">



        <h1 style="text-align: center; ">Some form, that does something</h1>

        <form class="some-form">
            <fieldset class="fieldset1">
                <legend>Choose one of the options</legend>
                <p>
                    <label class="custom-r">
                        <input type="radio" name="option" value="option1">
                        <span class="radio"></span>
                        <span>Option 1</span>
                    </label>
                </p>
                <p>
                    <label class="custom-r">
                        <input type="radio" name="option" value="option2">
                        <span class="radio"></span>
                        <span>Option 2</span>
                    </label>
                </p>
                <p>
                    <label class="custom-r">
                        <input type="radio" name="option" value="option3">
                        <span class="radio"></span>
                        <span>Option 3</span>
                    </label>
                </p>
            </fieldset>
            <fieldset class="fieldset1">
                <legend>Choose additional options</legend>
                <p>
                    <label class="custom-r">
                        <input type="checkbox" name="option2" value="option4">
                        <span class="radio2"></span>
                        <span> Another Option </span>
                    </label>
                </p>
                <p>
                    <label class="custom-r">
                        <input type="checkbox" name="option2" value="option5">
                        <span class="radio3"></span>
                        <span>Other Option</span>
                    </label>
                </p>
                <p>
                    <label class="custom-r">
                        <input type="checkbox" name="option2" value="option6">
                        <span class="radio4"></span>
                        <span>Other Option</span>
                    </label>
                </p>
            </fieldset>
            <button type="submit">Send</button>
        </form>

    </main>
