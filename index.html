<!DOCTYPE html>
<html lang="en">

<head>

<body>
    <main>
        <main>
            <section class="main-section">
                <div class="container">



                    <div id="userInfo" class="user-info py-rem" style="display:none;">
                        <h3>
                            Привіт <span id="userName"></span>!
                            Ти вже авторизований в системі.
                        </h3>
                        <br>
                        <button id="logout">Вийти</button>
                    </div>


                    <form id="mainForm" class="py-rem" style="display:none;">
                        <fieldset class="py-rem">
                            <legend>Інформація про користувача</legend>

                            <label class="py-rem">
                                <span>Ім'я:</span>
                                <input id="nameField" name="name" type="text" placeholder="Введіть ваше ім'я" required>
                            </label>

                        </fieldset>
                        <br>
                        <button type="submit">Зберегти</button>
                    </form>

                </div>
            </section>
        </main>

        <footer></footer>

        <script src="./js/script.js"></script>
    </main>
